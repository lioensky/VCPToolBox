<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多媒体缓存编辑器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="image_cache_editor.css">
    <script>
        // 监听来自父窗口的主题变化消息
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'themeChange') {
                const theme = event.data.theme;
                document.documentElement.setAttribute('data-theme', theme);
                // 可以选择将主题保存到 localStorage，以便在独立打开时保持一致
                // localStorage.setItem('theme', theme);
            }
        });

        // 页面加载时，向父窗口请求当前主题
        window.addEventListener('DOMContentLoaded', () => {
            if (window.parent && window.parent !== window) {
                 window.parent.postMessage({ type: 'requestTheme' }, '*');
            } else {
                // 如果是独立打开，则应用本地存储的主题或默认主题
                const storedTheme = localStorage.getItem('theme');
                const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");
                if (storedTheme) {
                    document.documentElement.setAttribute('data-theme', storedTheme);
                } else {
                    document.documentElement.setAttribute('data-theme', prefersDarkScheme.matches ? 'dark' : 'light');
                }
            }
        });
    </script>
</head>
<body>
<div class="container">
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索翻译描述 (支持中文)...">
            <button id="searchButton">搜索</button>
        </div>
        <div class="pagination-controls">
            <button id="prevPage">上一页</button>
            <span id="pageInfo">第 1 / 1 页</span>
            <button id="nextPage">下一页</button>
        </div>
    </div>

    <h2>多媒体缓存列表</h2>
    <div id="mediaList">
        <p>正在加载多媒体缓存数据...</p>
    </div>
</div>

<script>
    let currentPage = 1;
    let totalPages = 1;
    let pageSize = 20;
    let currentSearch = '';
    let mediaItems = [];

    const mediaListDiv = document.getElementById('mediaList');
    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const pageInfoSpan = document.getElementById('pageInfo');

    searchButton.addEventListener('click', () => {
        currentSearch = searchInput.value.trim();
        currentPage = 1;
        loadMediaCache();
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            currentSearch = searchInput.value.trim();
            currentPage = 1;
            loadMediaCache();
        }
    });

    prevPageBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            loadMediaCache();
        }
    });

    nextPageBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            loadMediaCache();
        }
    });

    async function loadMediaCache() {
        try {
            mediaListDiv.innerHTML = '<p>正在加载...</p>';
            const url = `/admin_api/multimodal-cache?page=${currentPage}&pageSize=${pageSize}&search=${encodeURIComponent(currentSearch)}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            mediaItems = data.items;
            totalPages = data.totalPages;
            currentPage = data.page;
            
            updatePaginationUI();
            renderMediaList();
        } catch (error) {
            console.error("加载多媒体缓存失败:", error);
            mediaListDiv.innerHTML = '<p style="color: red;">加载多媒体缓存失败。</p>';
        }
    }

    function updatePaginationUI() {
        pageInfoSpan.textContent = `第 ${currentPage} / ${totalPages || 1} 页 (共 ${mediaItems.length} 条)`;
        prevPageBtn.disabled = currentPage <= 1;
        nextPageBtn.disabled = currentPage >= totalPages;
    }

    async function handleUpdate(hash, entryDiv) {
        const textarea = entryDiv.querySelector('textarea');
        const updateBtn = entryDiv.querySelector('.save-item-btn');
        const description = textarea.value;

        updateBtn.disabled = true;
        const originalText = updateBtn.textContent;
        updateBtn.textContent = '...';

        try {
            const response = await fetch('/admin_api/multimodal-cache/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hash, description })
            });

            const result = await response.json();
            if (response.ok) {
                updateBtn.textContent = '已保存';
                updateBtn.style.backgroundColor = '#2ecc71';
                setTimeout(() => {
                    updateBtn.textContent = originalText;
                    updateBtn.style.backgroundColor = '';
                    updateBtn.disabled = false;
                }, 2000);
            } else {
                alert('更新失败: ' + result.error);
                updateBtn.disabled = false;
                updateBtn.textContent = originalText;
            }
        } catch (error) {
            alert('请求错误: ' + error.message);
            updateBtn.disabled = false;
            updateBtn.textContent = originalText;
        }
    }

    async function handleDelete(hash, entryDiv) {
        if (!confirm('确定要删除这个条目吗？')) return;

        try {
            const response = await fetch(`/admin_api/multimodal-cache/${hash}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                entryDiv.remove();
                if (mediaListDiv.children.length === 0 && totalPages > 1) {
                    loadMediaCache(); // Reload page if it's now empty
                }
            } else {
                const result = await response.json();
                alert('删除失败: ' + result.error);
            }
        } catch (error) {
            alert('请求错误: ' + error.message);
        }
    }


    async function handleReidentify(hash, entryDiv) {
        const reidentifyBtn = entryDiv.querySelector('.reidentify-btn');
        const descriptionTextarea = entryDiv.querySelector('textarea');
        const timestampElement = entryDiv.querySelector('h3');
        const originalBtnText = reidentifyBtn.innerHTML;

        reidentifyBtn.disabled = true;
        reidentifyBtn.innerHTML = '...';

        try {
            const response = await fetch('/admin_api/multimodal-cache/reidentify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hash: hash })
            });

            const result = await response.json();

            if (response.ok) {
                descriptionTextarea.value = result.newDescription || '';
                timestampElement.textContent = `时间戳: ${result.newTimestamp || 'N/A'}`;
                alert('媒体重新识别成功。');
            } else {
                alert('重新识别失败: ' + (result.error || '未知错误'));
            }
        } catch (error) {
            alert('错误: ' + error.message);
        } finally {
            reidentifyBtn.disabled = false;
            reidentifyBtn.innerHTML = originalBtnText;
        }
    }

    function renderMediaList() {
        mediaListDiv.innerHTML = '';

        if (mediaItems.length === 0) {
            mediaListDiv.innerHTML = '<p>没有匹配的缓存条目。</p>';
            return;
        }

        mediaItems.forEach(item => {
            const entryDiv = document.createElement('div');
            entryDiv.className = 'media-entry';
            entryDiv.dataset.hash = item.hash;

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'entry-actions';

            const reidentifyBtn = document.createElement('span');
            reidentifyBtn.className = 'reidentify-btn action-icon';
            reidentifyBtn.innerHTML = '↻';
            reidentifyBtn.title = '重新识别';
            reidentifyBtn.onclick = () => handleReidentify(item.hash, entryDiv);
            actionsDiv.appendChild(reidentifyBtn);

            const deleteBtn = document.createElement('span');
            deleteBtn.className = 'delete-btn action-icon';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.title = '删除';
            deleteBtn.onclick = () => handleDelete(item.hash, entryDiv);
            actionsDiv.appendChild(deleteBtn);

            entryDiv.appendChild(actionsDiv);

            const title = document.createElement('h3');
            title.textContent = `时间戳: ${item.timestamp || 'N/A'}`;
            entryDiv.appendChild(title);

            const mimeType = item.mimeType || 'image/jpeg';
            let mediaElement;

            if (mimeType.includes('image/')) {
                mediaElement = document.createElement('img');
                mediaElement.onclick = function() {
                    showPreview(this.src);
                };
            } else if (mimeType.includes('audio/')) {
                mediaElement = document.createElement('audio');
                mediaElement.controls = true;
            } else if (mimeType.includes('video/')) {
                mediaElement = document.createElement('video');
                mediaElement.controls = true;
            } else {
                mediaElement = document.createElement('div');
                mediaElement.className = 'unsupported-media';
                mediaElement.innerHTML = `<p>不支持的媒体类型: ${mimeType}</p>`;
            }

            if (mediaElement.tagName !== 'DIV') {
                mediaElement.src = item.base64.startsWith('data:') ? item.base64 : `${mimeType};base64,${item.base64}`;
            }
            entryDiv.appendChild(mediaElement);

            const descriptionLabel = document.createElement('label');
            descriptionLabel.textContent = '媒体描述:';
            entryDiv.appendChild(descriptionLabel);

            const descriptionTextarea = document.createElement('textarea');
            descriptionTextarea.value = item.description || '';
            entryDiv.appendChild(descriptionTextarea);

            const saveItemBtn = document.createElement('button');
            saveItemBtn.className = 'save-item-btn';
            saveItemBtn.textContent = '保存更改';
            saveItemBtn.onclick = () => handleUpdate(item.hash, entryDiv);
            entryDiv.appendChild(saveItemBtn);

            const hashInfo = document.createElement('div');
            hashInfo.className = 'base64-keyHash';
            hashInfo.textContent = `Hash: ${item.hash}`;
            entryDiv.appendChild(hashInfo);

            mediaListDiv.appendChild(entryDiv);
        });
    }

    function showPreview(src) {
        const modal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        if (modal && modalContent) {
            modalContent.innerHTML = '';
            const img = document.createElement('img');
            img.src = src;
            modalContent.appendChild(img);
            modal.style.display = "block";
            document.body.style.overflow = 'hidden';
        }
    }

    // 将 closeModal 暴露到全局，方便父窗口调用
    window.closeModal = function() {
        const modal = document.getElementById('mediaModal');
        if (!modal) return;
        
        modal.style.display = "none";
        document.body.style.overflow = '';
        document.documentElement.style.overflow = '';
        
        // 停止并清理媒体内容
        const modalContent = document.getElementById('modalContent');
        if (modalContent) {
            const media = modalContent.querySelector('video, audio');
            if (media) {
                media.pause();
                media.src = '';
            }
            modalContent.innerHTML = '';
        }
    };

    // 3. 允许图片点击放大预览 - Modal handling JavaScript
    window.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('mediaModal');
        const modalCloseButton = document.getElementById('modalCloseButton');

        if (modal && modalCloseButton) {
            modalCloseButton.onclick = window.closeModal;

            modal.onclick = function(event) {
                if (event.target === modal) {
                    window.closeModal();
                }
            }

            document.addEventListener('keydown', function(event) {
                if (event.key === "Escape" && modal.style.display === "block") {
                    window.closeModal();
                }
            });
        } else {
            console.error('Modal or modal close button not found on DOMContentLoaded. Check IDs: mediaModal, modalCloseButton');
        }

        // Load data when the page loads
        loadMediaCache();
    });
</script>

<!-- Modal for Media Preview -->
<div id="mediaModal" class="modal">
    <span class="modal-close" id="modalCloseButton">&times;</span>
    <div class="modal-content" id="modalContent"></div>
</div>
</body>
</html>
