name: Node.js CI & Docker Build

on:
  push:
    branches: [ main, prod/stable ]
  pull_request:
    branches: [ main, prod/stable ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # 仅保留 Node 20, 移除 18.x

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check production baseline
      run: npm run test:baseline

    - name: Run core tests
      run: npm test

    - name: Run Photo Studio tests
      run: npm run test:photo-studio

    - name: Run DingTalk CLI tests
      run: npm run test:dingtalk-cli

  detect_docker_changes:
    runs-on: ubuntu-latest

    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Detect Docker-relevant changes
      id: detect
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "Docker build required for protected branch push." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        base_sha="${{ github.event.pull_request.base.sha }}"
        head_sha="${{ github.event.pull_request.head.sha }}"
        changed_files="$(git -c core.quotePath=false diff --name-only "$base_sha" "$head_sha")"
        relevant_files="$(printf '%s\n' "$changed_files" | grep -Ev '^(docs/|.*\.md$|\.github/PULL_REQUEST_TEMPLATE\.md$)' || true)"

        if [[ -n "$relevant_files" ]]; then
          should_build=true
        else
          should_build=false
        fi

        echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
        {
          echo "Docker build required: $should_build"
          echo
          echo "Changed files:"
          printf '%s\n' "$changed_files"
        } >> "$GITHUB_STEP_SUMMARY"

  docker_build:
    runs-on: ubuntu-latest
    needs: [build_and_test, detect_docker_changes]
    if: needs.detect_docker_changes.outputs.should_build == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: false # 在 PR 检查和 main 分支构建时不推送镜像
        tags: lioensky/vcptoolbox:latest # 替换为您的 Docker Hub 用户名/组织名和镜像名
